components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
          description: email del usuario
        password:
          type: string
          description: contrasena del usuario
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT de acceso
        type:
          type: string
          description: tipo de autenticacion
          example: Bearer
        id:
          type: integer
          format: int64
          description: id del usuario
        name:
          type: string
          description: nombre visible del usuario
        email:
          type: string
          format: email
          description: email del usuario
        roles:
          type: array
          items:
            type: string
          description: roles asignados al usuario
    MeResponseDto:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        profileType:
          type: string
          description: tipo de perfil operativo resuelto para el usuario autenticado
        socioId:
          type: integer
          format: int64
          nullable: true
        participanteId:
          type: integer
          format: int64
          nullable: true
        participanteIds:
          type: array
          items:
            type: integer
            format: int64
        trabajadorId:
          type: integer
          format: int64
          nullable: true
    PrivateAreaRequestDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        kind:
          type: string
          description: tipo de operacion, ACTIVITY o SERVICE
        itemId:
          type: integer
          format: int64
          description: id de la actividad o servicio relacionado
        title:
          type: string
          description: titulo mostrado en el area privada
        createdAt:
          type: string
          format: date
        state:
          type: string
        price:
          type: number
          format: float
        participanteId:
          type: integer
          format: int64
    AccessCodeResponseDto:
      type: object
      properties:
        usuarioId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        initialPassword:
          type: string
          description: contrasena inicial o regenerada
    SocioAccessResponseDto:
      type: object
      properties:
        socio:
          $ref: '#/components/schemas/SocioDto'
        usuarioId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        initialPassword:
          type: string
    ParticipanteAccessResponseDto:
      type: object
      properties:
        participante:
          $ref: '#/components/schemas/ParticipanteDto'
        usuarioId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        initialPassword:
          type: string
    TrabajadorAccessResponseDto:
      type: object
      properties:
        trabajador:
          $ref: '#/components/schemas/TrabajadorOutDto'
        usuarioId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        initialPassword:
          type: string
    Socio:
      type: object
      required: [ dni, name, surname, email, phoneNumber ]
      properties:
        id:
          type: integer
          format: int64
          description: id de socio
        dni:
          type: string
          pattern: '^[0-9]{8}[A-Z]$'
          description: dni de socio
        name:
          type: string
          description: nombre de socio
        surname:
          type: string
          description: apellidos de socio
        email:
          type: string
          format: email
          description: email de socio
        address:
          type: string
          description: direccion de vivienda de socio
        phoneNumber:
          type: string
          pattern: '^\d{3}-\d{3}-\d{3}$'
          description: nº de telefono de socio
        familyModel:
          type: string
          description: tipo de modelo familiar
        active:
          type: boolean
          description: socio está activo o no
        entryDate:
          type: string
          format: date
          description: fecha de alta de socio
        outDate:
          type: string
          format: date
          nullable: true
          description: fecha de baja de socio
    SocioDto:
      type: object
      properties:
        id:
          description: id de socio
          type: integer
          format: int64
        dni:
          description: dni de socio
          type: string
          pattern: '^[0-9]{8}[A-Z]$'
        name:
          description: nombre de socio
          type: string
        surname:
          description: apellidos de socio
          type: string
        email:
          description: email de socio
          type: string
          format: email
        phoneNumber:
          description: nº de telefono de socio
          type: string
          pattern: '^\d{3}-\d{3}-\d{3}$'
        familyModel:
          description: tipo de modelo familiar
          type: string
        active:
          description: socio está activo o no
          type: boolean
        entryDate:
          description: fecha de alta de socio
          type: string
          format: date
        outDate:
          description: fecha de baja de socio
          type: string
          format: date
          nullable: true
        reason:
          description: motivo de baja del socio. Solo aplica cuando el socio está inactivo
          type: string
          nullable: true
        participanteDtoList:
          type: array
          items:
            $ref: '#/components/schemas/ParticipanteDto'
    ParticipanteDto:
      type: object
      properties:
        dni:
          description: dni de participante
          type: string
          pattern: '^[0-9]{8}[A-Z]$'
        name:
          description: nombre de participante
          type: string
        surname:
          description: apellido de participante
          type: string
