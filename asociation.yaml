openapi: 3.0.1
info:
  title: API association
  version: 1.0.0
  description: API for membership, activities and services of the association
servers:
  - url: 'http://localhost:8080/api'
security:
  - bearerAuth: [ ]
paths:
  /v1/auth/login:
    post:
      summary: Iniciar sesion
      description: Autentica un usuario mediante email y contrasena y devuelve un JWT
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              Example1:
                $ref: '#/components/examples/loginRequestExample1'
      responses:
        200:
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                Example1:
                  $ref: '#/components/examples/loginResponseExample1'
        400:
          description: Error en credenciales o validacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400*'
        401:
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized 401'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/me:
    get:
      summary: Devuelve el perfil autenticado
      description: Obtiene la informacion del usuario autenticado y sus perfiles vinculados
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponseDto'
              examples:
                ExampleSocio:
                  $ref: '#/components/examples/meResponseSocioExample'
                ExampleParticipante:
                  $ref: '#/components/examples/meResponseParticipanteExample'
        401:
          description: Token ausente o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized 401'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/me/requests:
    get:
      summary: Devuelve las operaciones visibles del area privada
      description: Lista inscripciones a actividades y solicitudes de servicios visibles para el usuario autenticado
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrivateAreaRequestDto'
              examples:
                Example1:
                  $ref: '#/components/examples/privateAreaRequestsExample'
        401:
          description: Token ausente o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized 401'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/socios:
    get:
      summary: Devuelve lista de socios
      description: |
        Devuelve una lista de todos los socios miembros de la asociacion
        se permite filtrar por 3 campos simultáneamente: 
          -familyModel
          -active
          -entryDate
      parameters:
        - name: familyModel
          in: query
          description: Filtro por modelo familiar
          required: false
          schema:
            type: string
            example: Nuclear

        - name: active
          in: query
          description: Filtro por estado de activo
          required: false
          schema:
            type: boolean
            example:
              value: true

        - name: entryDate
          in: query
          description: Filtro por fecha de entrada (filtra todos los socios que entraron después)
          required: false
          schema:
            type: string
            format: date
            example: '2025-04-07'

      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SocioDto'
              examples:
                CasoÉxito1:
                  $ref: '#/components/examples/socioDtoExample1'
                CasoÉxito2:
                  $ref: '#/components/examples/socioDtoExample2'
        404:
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
    post:
      summary: Sube un nuevo socio
      description: Añadir nuevo socio al registro
      requestBody:
        description: Datos del Socio
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Socio'
            examples:
              Caso1:
                $ref: '#/components/examples/socioExample1'
              Caso2:
                $ref: '#/components/examples/socioExample2'
              BadCase:
                $ref: '#/components/examples/socioExampleBad'
      responses:
        201:
          description: Socio creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocioAccessResponseDto'
              examples:
                CasoÉxito1:
                  $ref: '#/components/examples/socioAccessResponseExample1'
                CasoÉxito2:
                  $ref: '#/components/examples/socioAccessResponseExample1'
        400:
          description: Error en campos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400*'
        409:
          description: Socio ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/socios/{id}:
    get:
      summary: Devuelve socio por id
      description: Busca el socio individual que tiene el id indicado
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocioDto'
              examples:
                Example1:
                  $ref: '#/components/examples/socioDtoExample1'
                Example2:
                  $ref: '#/components/examples/socioDtoExample2'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
    put:
      summary: Editar socio por id
      description: Editar socio cuyo id coincide con la búsqueda
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Socio'
            examples:
              Example1:
                $ref: '#/components/examples/socioExample1'
              Example2:
                $ref: '#/components/examples/socioExample2'
              BadCase:
                $ref: '#/components/examples/socioExampleBad'
      responses:
        200:
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Socio'
              examples:
                Example:
                  $ref: '#/components/examples/socioExample1'
        400:
          description: Datos editados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400*'
              example:
                $ref: '#/components/examples/socioExampleBad'
        404:
          description: Socio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: Conflicto con data ya existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/socios/{id}/baja:
    post:
      summary: Dar de baja socio
      description: Da de baja al socio indicado, desactiva su acceso y marca inactivos a sus participantes asociados
      requestBody:
        description: Datos administrativos de la baja
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BajaRequestDto'
      responses:
        204:
          description: Baja aplicada
        404:
          description: Socio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: El socio ya fue dado de baja
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/socios/{id}/access-code:
    post:
      summary: Regenerar acceso del socio
      description: Regenera las credenciales iniciales del socio indicado
      responses:
        200:
          description: Credenciales regeneradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessCodeResponseDto'
              examples:
                Example1:
                  $ref: '#/components/examples/accessCodeResponseExample1'
        404:
          description: Socio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: El socio no tiene acceso activo para regenerar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/socios/{id}/reactivar:
    post:
      summary: Reactivar socio
      description: Reactiva al socio indicado y su usuario de acceso. Los participantes asociados deben reactivarse por separado
      responses:
        204:
          description: Reactivacion aplicada
        404:
          description: Socio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: El socio ya estaba activo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/participantes:
    get:
      summary: Devuelve lista de participantes
      description: |
        Devuelve una lista de todos los participantes miembros de la asociacion
        se permite filtrar por 3 campos simultáneamente: 
          -typeRel
          -name
          -birthDate
      parameters:
        - name: typeRel
          in: query
          description: Filtro por tipo de relación
          required: false
          schema:
            type: string
          example: cónjuge
        - name: name
          in: query
          description: Filtro por nombre (iniciales)
          required: false
          schema:
            type: string
          example: Juanjo
        - name: birthDate
          in: query
          description: Filtro por fecha de nacimiento (filtra todos los que nacieron después)
          required: false
          schema:
            type: string
            format: date
          example: 1983-12-04
        - name: active
          in: query
          description: Filtro por estado de activo
          required: false
          schema:
            type: boolean
          example: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParticipanteOutDto'
              examples:
                CasoÉxito1:
                  $ref: '#/components/examples/participanteExample1'
                CasoÉxito2:
                  $ref: '#/components/examples/participanteExample2'
        404:
          description: Participante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/participantes/{id}:
    get:
      summary: Devuelve participante por id
      description: Busca el participante individual con el id indicado
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipanteDto'
              examples:
                CasoÉxito1:
                  $ref: '#/components/examples/participanteExample1'
                CasoÉxito2:
                  $ref: '#/components/examples/participanteExample2'
        404:
          description: Participante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
              example:
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
    put:
      summary: Editar participante por id
      description: Editar participante cuyo id coincide con la búsqueda
      requestBody:
        content:
          application/json:
            examples:
              Example1:
                $ref: '#/components/examples/participanteExample1'
              Example2:
                $ref: '#/components/examples/participanteExample2'
              BadCase:
                $ref: '#/components/examples/participanteExampleBad'
      responses:
        200:
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipanteDto'
              examples:
                Example1:
                  $ref: '#/components/examples/participanteExample1'
                Example2:
                  $ref: '#/components/examples/participanteExample2'
        400:
          description: Datos editados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400*'
              example:
                $ref: '#/components/examples/participanteExampleBad'
        404:
          description: Participante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: Conflicto con data ya existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/participantes/{id}/baja:
    post:
      summary: Dar de baja participante
      description: Da de baja al participante indicado y desactiva su usuario de acceso
      requestBody:
        description: Datos administrativos de la baja
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BajaRequestDto'
      responses:
        204:
          description: Baja aplicada
        404:
          description: Participante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: El participante ya fue dado de baja
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/participantes/{id}/access-code:
    post:
      summary: Regenerar acceso del participante
      description: Regenera las credenciales iniciales del participante indicado
      responses:
        200:
          description: Credenciales regeneradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessCodeResponseDto'
              examples:
                Example1:
                  $ref: '#/components/examples/accessCodeResponseExample2'
        404:
          description: Participante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: El participante no tiene acceso activo para regenerar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/participantes/{id}/reactivar:
    post:
      summary: Reactivar participante
      description: Reactiva al participante indicado y su usuario de acceso. Requiere que su socio siga activo
      responses:
        204:
          description: Reactivacion aplicada
        404:
          description: Participante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: El participante ya estaba activo o su socio sigue inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/socios/{id}/participante:
    post:
      summary: Sube un nuevo participante
      description: Añadir nuevo participante al registro
      requestBody:
        description: Datos del participantes
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipanteDto'
            examples:
              Example1:
                $ref: '#/components/examples/participanteExample1'
              Example2:
                $ref: '#/components/examples/participanteExample2'
              BadCase:
                $ref: '#/components/examples/participanteExampleBad'
      responses:
        201:
          description: Participante creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipanteAccessResponseDto'
              examples:
                CasoÉxito1:
                  $ref: '#/components/examples/participanteAccessResponseExample1'
                CasoÉxito2:
                  $ref: '#/components/examples/participanteAccessResponseExample1'
        400:
          description: Data not valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400*'
        409:
          description: Participante ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        404:
          description: Socio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/actividades:
    get:
      summary: Devuelve lista de actividades
      description: |
        Devuelve una lista de todos las actividades que están anunciadas en la asociacion
        se permite filtrar por 3 campos simultáneamente: 
          -duration
          -canJoin
          -dayActivity
      parameters:
        - name: duration
          in: query
          description: Filtro por la duración
          required: false
          schema:
            type: number
            format: float
          example:
            minimum:
              value: 0
        - name: canJoin
          in: query
          description: Filtro por si es posible apuntarse o no
          required: false
          schema:
            type: boolean
          example:
            value: true, false

        - name: dayActivity
          in: query
          description: Filtro por fecha de dia (filtra todos las que sucedan ese día)
          required: false
          schema:
            type: string
            format: date
          example:
            value: 2026-03-03
        - name: archived
          in: query
          description: Filtro por estado de archivado
          required: false
          schema:
            type: boolean
          example: false
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActividadOutDto'
              example:
                type: array
                Example1:
                  $ref: '#/components/examples/actividadOutExample1'
                Example2:
                  $ref: '#/components/examples/actividadOutExample2'
        404:
          description: Actividad no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
    post:
      summary: Sube una nueva actividad
      description: Añadir nueva actividad al registro
      requestBody:
        description: Datos de actividad
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActividadDto'
            examples:
              Example1:
                $ref: '#/components/examples/actividadOutExample1'
              Example2:
                $ref: '#/components/examples/actividadOutExample2'
              Badcase:
                $ref: '#/components/examples/actividadOutExampleBad'
      responses:
        201:
          description: Actividad creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActividadOutDto'
              examples:
                Example1:
                  $ref: '#/components/examples/actividadOutExample1'
                Example2:
                  $ref: '#/components/examples/actividadOutExample2'
        400:
          description: Data not valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400**'
        409:
          description: Actividad ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
              example:
                Caso1:
                  value:
                    $ref: '#/components/examples/actividadOutExample1'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/actividades/{id}:
    get:
      summary: Devuelve actividad por id
      description: Busca la actividad individual con el id indicado
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActividadOutDto'
              examples:
                Caso1:
                  value:
                    $ref: '#/components/examples/actividadOutExample1'
                Caso2:
                  value:
                    $ref: '#/components/examples/actividadOutExample2'
        404:
          description: Actividad no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
    put:
      summary: Editar actividad por id
      description: Editar actividad cuyo id coincide con la búsqueda
      requestBody:
        description: Datos de actividad
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Actividad'
            examples:
              Example1:
                $ref: '#/components/examples/actividadOutExample1'
              Example2:
                $ref: '#/components/examples/actividadOutExample2'
              Badcase:
                $ref: '#/components/examples/actividadOutExampleBad'
      responses:
        200:
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actividad'
              examples:
                Example1:
                  $ref: '#/components/examples/actividadOutExample1'
                Example2:
                  $ref: '#/components/examples/actividadOutExample2'
        400:
          description: Datos editados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400**'
        404:
          description: Actividad no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: Conflicto con data ya existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
              examples:
                Example1:
                  $ref: '#/components/examples/actividadOutExample1'
                Example2:
                  $ref: '#/components/examples/actividadOutExample2'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
    delete:
      summary: Archiva actividad por id
      description: Archiva la actividad cuyo id coincide con la búsqueda
      responses:
        204:
          description: Archivado aplicado
        404:
          description: Actividad no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: La actividad ya fue archivada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
  /v1/actividades/{id}/inscripciones:
    post:
      summary: Inscribir participante en actividad
      description: Crea una inscripción para un participante en la actividad indicada
      requestBody:
        description: ID del participante a inscribir
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InscripcionActividadRequestDto'
      responses:
        201:
          description: Inscripción creada
        400:
          description: Data not valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest400**'
        404:
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        409:
          description: Conflicto de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict 409'
        500:
