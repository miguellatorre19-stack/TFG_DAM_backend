version: "3.9"

services:
  db:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DEV_DB_NAME:-association}
      MARIADB_USER: ${DEV_DB_USER:-association_user}
      MARIADB_PASSWORD: ${DEV_DB_PASSWORD:-association_password}
      MARIADB_ROOT_PASSWORD: ${DEV_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DEV_DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_net

  asociation-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: asociation-api:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DEV_DB_HOST: db
      DEV_DB_PORT: 3306
      DEV_DB_NAME: ${DEV_DB_NAME:-association}
      DEV_DB_USER: ${DEV_DB_USER:-association_user}
      DEV_DB_PASSWORD: ${DEV_DB_PASSWORD:-association_password}
    networks:
      - app_net

volumes:
  db_data:

networks:
  app_net:
