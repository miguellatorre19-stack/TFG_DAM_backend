spring.application.name=association
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mariadb://${DB_HOST:127.0.0.1}:${DB_PORT:3308}/${DB_NAME:association}
spring.datasource.username=${DB_USER:association_user}
spring.datasource.password=${DB_PASSWORD:association_password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

app.seed-data.enabled=${SEED_DATA_ENABLED:true}
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:3000}

jwt.secret=${JWT_SECRET:dev_secret_key_for_tfg_dam_project_2026_change_me_please}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
